name: CI

on:
  pull_request:
  push:
    branches: [ "main" ]
  merge_group:

jobs:
  test_and_lint:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: gradle

      - name: Run checks (tests + lint)
        run: ./gradlew clean check